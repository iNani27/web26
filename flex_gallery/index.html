<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>flex gallery</title>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial;
            }

            .header {
                text-align: center;
                padding: 32px;
            }

            .container {
                display: flex;
                flex-wrap: wrap;
                padding: 0 4px;
            }

            /* Create four equal columns that sits next to each other */
            .column {
                flex: 25%;
                max-width: 25%;
                padding: 0 4px;
            }

            .column img {
                margin-top: 8px;
                vertical-align: middle;
            }

            /* Responsive layout - makes a two column-layout instead of four columns */
            @media screen and (max-width: 800px) {
                .column {
                    flex: 50%;
                    max-width: 50%;
                }
            }

            /* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
            @media screen and (max-width: 600px) {
                .column {
                    flex: 100%;
                    max-width: 100%;
                }
            }
        </style>
    </head>
    <body>

        <!-- Header -->
        <div class="header">
            <h1>Responsive Image Gallery</h1>
            <p>Resize the browser window to see the responsive effect.</p>
            <p>Une, deux ou quatre colonnes</p>
        </div>

        <!-- Photo Grid -->
        <div class="container"> 
            <div class="column">
                <img src="img/atlantios-rainforest-3119822_640.jpg" alt="" style="width:100%">
                <img src="img/jplenio-forest-8684668.jpg" alt="" style="width:100%">
