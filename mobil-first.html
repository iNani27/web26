<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mobile First → Desktop</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Arial, sans-serif;
                padding-bottom: 60px; /* mobile bottom nav */
            }

            main {
                padding: 20px;
            }

            /* =========================
               MOBILE : bottom nav
            ========================== */
            nav {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 60px;
                background: #222;
                display: flex;
                justify-content: space-around;
                align-items: center;
            }

            nav a {
                color: white;
                text-decoration: none;
                font-size: 14px;
                flex: 1;
                text-align: center;
            }

            /* =========================
               DESKTOP VERSION
            ========================== */
            @media (min-width: 768px) {

                body {
                    padding-bottom: 0;
                    padding-top: 70px; /* espace pour top nav */
                }

                nav {
                    top: 0;
                    bottom: auto;
                    height: 70px;
                    justify-content: flex-start;
                    padding: 0 20px;
                    gap: 20px;
                }

                nav a {
                    flex: none;
                    font-size: 16px;
                    padding: 10px 15px;
                    border-radius: 6px;
                }

                nav a:hover {
                    background: #444;
                }
            }
        </style>
    </head>

    <body>

        <main>
            <h1>Version Responsive</h1>
            <p>Mobile → bottom nav / Desktop → top nav</p>
        </main>

        <nav>
            <a href="#">🏠 Home</a>
            <a href="#">🔍 Search</a>
            <a href="#">❤️ Favoris</a>
            <a href="#">👤 Profil</a>
        </nav>

    </body>
</html>
