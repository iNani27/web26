<!DOCTYPE html>
<html>
    <head>
        <style>
            .cta {
                display: inline-flex;
                align-items: center;
                gap: 12px;
                border-radius: 999px;
                padding: 12px 22px;
                background: #2563eb;
                color: #fff;
                text-decoration: none;
                transition: background 180ms ease, transform 180ms ease;
            }
            .cta:hover,
            .cta:focus-visible {
                background: #1d4ed8;
                transform: translateY(-2px);
            }
            .cta:hover {
                background: #38bdf8;
            }
        </style>
    </head>
    <body>
        <a class="cta" href="#">
            Launch project
        </a>
    </body>
</html>
